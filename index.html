<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tAo | 平面视觉设计师 Portfolio</title>
    
    <!-- SEO 优化 -->
    <meta name="description" content="tAo - 平面视觉设计师，主攻品牌与书籍设计。">
    <meta name="keywords" content="tAo, 设计师, 品牌设计, 书籍设计, 平面设计">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000;
            --border: #f2f2f2;
            --index-w: 100px; 
            --header-h: 100px;
            --transition: transform .8s cubic-bezier(0.19,1,0.22,1), opacity .6s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', -apple-system, "PingFang SC", sans-serif; 
            background: var(--bg); color: var(--text); overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Header --- */
        header {
            position: fixed; top: 0; left: 0; 
            width: calc(100% - var(--index-w)); 
            height: var(--header-h);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; z-index: 7000; 
            background: rgba(255,255,255,0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            transition: width 0.3s ease;
        }
        .header-logo img { height: 32px; width: auto; display: block; cursor: pointer; }
        nav ul { list-style: none; display: flex; gap: 35px; }
        nav a { text-decoration: none; color: #000; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; }

        /* --- 首页 Hero --- */
        #home { width: 100%; height: 100vh; display: flex; justify-content: flex-start; align-items: center; padding-left: 60px; }
        #home img { width: 45vw; max-width: 600px; height: auto; }

        /* --- 丝滑侧边栏 --- */
        .right-sidebar {
            position: fixed; top: 0; right: 0; width: var(--index-w); height: 100vh;
            background: #fff; border-left: 1px solid var(--border); z-index: 8000;
            overflow: hidden; touch-action: none;
        }
        #side-index-container { display: flex; flex-direction: column; width: 100%; will-change: transform; transform: translate3d(0,0,0); }
        .thumb-item { width: 100%; padding: 25px 15px; text-align: center; cursor: pointer; flex-shrink: 0; }
        .thumb-item img { width: 100%; aspect-ratio: 1; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); transition: transform 0.3s ease; }
        .thumb-item:hover img { transform: scale(1.15); }

        /* --- 主内容 --- */
        main { margin-right: var(--index-w); }
        section { padding: 120px 60px; border-bottom: 1px solid var(--border); }
        .work-item { margin-bottom: 160px; cursor: pointer; text-align: center; width: 100%; }
        .equal-width-media { max-width: 100%; max-height: 85vh; width: auto; height: auto; object-fit: contain; box-shadow: 0 40px 100px rgba(0,0,0,0.06); }

        /* --- ALL 页面 --- */
        #all-projects-overlay { position: fixed; inset: 0; background: #fff; z-index: 6500; transform: translateY(100%); transition: var(--transition); overflow-y: auto; padding: 25vh 12vw; }
        #all-projects-overlay.active { transform: translateY(0); }
        .all-grid { display: grid; grid-template-columns: repeat(3, 1fr); column-gap: 15vw; row-gap: 15vw; max-width: 1600px; margin: 0 auto; }
        .all-item { cursor: pointer; transition: 0.5s; text-align: center; }
        .all-item img { width: 100%; aspect-ratio: 1; object-fit: contain; filter: drop-shadow(0 15px 35px rgba(0,0,0,0.1)); }

        /* --- 二级详情页 --- */
        #detail-modal { position: fixed; inset: 0; background: #fff; z-index: 6800; transform: translateX(100%); transition: var(--transition); overflow-y: auto; padding: 180px 80px 100px; }
        #detail-modal.active { transform: translateX(0); }
        .detail-media { width: 100% !important; max-height: none !important; height: auto !important; display: block; margin-bottom: 50px; box-shadow: 0 40px 100px rgba(0,0,0,0.06); }
        .detail-info-grid { display: grid; grid-template-columns: 2.5fr 1fr 1fr; gap: 40px; border-bottom: 1.5px solid #000; padding-bottom: 30px; margin-bottom: 80px; }
        .info-col h3 { font-size: 11px; text-transform: uppercase; color: #999; margin-bottom: 10px; }
        .info-col p { font-size: 16px; font-weight: 700; }
        .close-btn { position: fixed; top: 130px; right: 130px; font-weight: 700; cursor: pointer; z-index: 7500; border-bottom: 2px solid #000; text-transform: uppercase; font-size: 12px; }

        /* 二维码 */
        .qr-box { width: 180px; height: 180px; border: 1px solid var(--border); padding: 10px; display: flex; align-items: center; justify-content: center; }

        /* 移动端适配 */
        @media (max-width: 1024px) {
            header { width: 100%; padding: 0 25px; height: 80px; }
            main { margin-right: 0; margin-bottom: 100px; }
            #home { padding-left: 25px; } #home img { width: 85vw; }
            .right-sidebar { top: auto; bottom: 0; width: 100%; height: 100px; border-left: none; border-top: 1px solid var(--border); }
            .all-grid { grid-template-columns: repeat(2, 1fr); column-gap: 8vw; row-gap: 8vw; }
            #detail-modal { padding: 140px 25px 120px; }
            .close-btn { top: 110px; right: 25px; }
            .detail-info-grid { grid-template-columns: 1fr; gap: 20px; }
            .contact-wrap { height: auto; flex-direction: column; text-align: center; padding: 50px 0; gap: 40px; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-logo" onclick="navTo('home')"><img src="pencil.webp" alt="Logo"></div>
        <nav>
            <ul>
                <li><a onclick="showAll()">All</a></li>
                <li><a onclick="navTo('works')">Works</a></li>
                <li><a onclick="navTo('about')">About</a></li>
                <li><a onclick="navTo('contact')">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- 首页 Logo 左对齐 -->
        <section id="home"><img src="logo.svg" alt="tAo"></section>
        
        <!-- 作品列表 -->
        <section id="works"><div id="project-list"></div></section>

        <!-- 关于页 -->
        <section id="about">
            <div style="max-width: 1000px;">
                <h1 style="font-size: 58px; font-weight: 700; margin-bottom: 40px; line-height: 1.1;">创意！创意！创意！<br><span style="font-weight: 400; color: #888; font-size: 32px;">Less noise. More identity.</span></h1>
                <p style="font-size: 22px; line-height: 1.7; font-weight: 500; color: #333;">平面视觉设计师，主攻品牌与书籍设计，<br>重逻辑、抠细节，兼顾创意表达与落地适配。</p>
            </div>
        </section>

        <!-- 联系页 -->
        <section id="contact">
            <div style="height: 60vh; display: flex; justify-content: space-between; align-items: center; max-width: 1100px;" class="contact-wrap">
                <div>
                    <h2 style="font-size: 54px; font-weight: 700; margin-bottom: 25px; letter-spacing: -0.02em;">Hi。我是 tAo</h2>
                    <p style="font-size: 18px; color: #666; line-height: 1.8;">
                        WeChat: <span style="color:#000; font-weight:700;">tAo_Graphic</span><br>
                        XHS: <span style="color:#000; font-weight:700;">@tAo_Graphic_</span>
                    </p>
                </div>
                <div class="qr-box"><img src="wechat_qr.webp" alt="QR" style="width:100%; height:100%; object-fit:contain;"></div>
            </div>
        </section>
    </main>

    <!-- 侧边栏/底部栏 -->
    <aside class="right-sidebar">
        <div id="side-index-container"></div>
    </aside>

    <!-- ALL 索引 -->
    <div id="all-projects-overlay"><div class="all-grid" id="all-grid-container"></div></div>

    <!-- 详情层 -->
    <div id="detail-modal">
        <div class="close-btn" onclick="closeDetail()">CLOSE / 返回</div>
        <div id="detail-inner"></div>
    </div>

    <script>
        /**
         * 严格对应 GitHub 仓库中的文件名大小写
         */
        const projectData = [
            { k: 'A', name: 'Aether', date: '2025', ind: '洗护', ext: 'webp', subExt: 'jpg' },
            { k: 'B', name: '公园', date: '2024', ind: '书籍设计', ext: 'webp', subExt: 'jpg' },
            { k: 'C', name: '闪回', date: '2025', ind: '非标商业', ext: 'webp', subExt: 'mov' },
            { k: 'D', name: 'Ye4新年礼盒视觉', date: '2026', ind: '节庆视觉', ext: 'webp', subExt: 'jpg' },
            { k: 'E', name: 'OMNI-V', date: '2026', ind: '智能科技', ext: 'mov', subExt: 'mov' },
            { k: 'F', name: '鲜及', date: '2026', ind: '零售', ext: 'webp', subExt: 'jpg' },
            { k: 'G', name: '小芽纪', date: '2025', ind: '儿童零食', ext: 'webp', subExt: 'jpg' },
            { k: 'H', name: '走马观茶', date: '2025', ind: '茶饮零售', ext: 'webp', subExt: 'jpg' },
            { k: 'I', name: 'Hoppop', date: '2026', ind: '服饰', ext: 'webp', subExt: 'jpg' },
            { k: 'J', name: '巴适主义', date: '2026', ind: '书籍设计', ext: 'mp4', subExt: 'mp4' },
            { k: 'K', name: '有时coffee', date: '2025', ind: '咖啡', ext: 'webp', subExt: 'jpg' },
            { k: 'L', name: 'HALO', date: '2024', ind: '商业健身', ext: 'webp', subExt: 'jpg' }
        ];

        function renderMedia(file, isDetail = false) {
            const ext = file.split('.').pop().toLowerCase();
            const cls = isDetail ? 'detail-media' : 'equal-width-media';
            if (['mp4', 'mov', 'webm'].includes(ext)) {
                return `<video autoplay muted loop playsinline class="${cls}"><source src="${file}" type="video/mp4"></video>`;
            }
            return `<img src="${file}" alt="${file}" class="${cls}" loading="lazy">`;
        }

        const sideContainer = document.getElementById('side-index-container');
        const projectWall = document.getElementById('project-list');
        const allGrid = document.getElementById('all-grid-container');

        function setup() {
            // 侧边栏/底部栏初始化 (3倍克隆)
            [...projectData, ...projectData, ...projectData].forEach(p => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-item';
                // 缩略图固定为 a0.webp, b0.webp...
                thumb.innerHTML = `<img src="${p.k.toLowerCase()}0.webp" alt="thumb">`;
                thumb.onmouseenter = () => { if(window.innerWidth > 1024) hoverSync(`p-${p.k}`); };
                thumb.onclick = () => openDetail(p.k);
                sideContainer.appendChild(thumb);
            });

            projectData.forEach(p => {
                const gridItem = document.createElement('div');
                gridItem.className = 'all-item';
                gridItem.innerHTML = `<img src="${p.k.toLowerCase()}0.webp" alt="thumb">`;
                gridItem.onclick = () => { hideAll(); openDetail(p.k); };
                allGrid.appendChild(gridItem);

                const block = document.createElement('div');
                block.className = 'work-item'; block.id = `p-${p.k}`;
                block.onclick = () => openDetail(p.k);
                block.innerHTML = `<div style="width:100%; display:flex; justify-content:center;">${renderMedia(`${p.k}.${p.ext}`)}</div>`;
                projectWall.appendChild(block);
            });

            initSmoothScroll();
        }

        /* --- 丝滑滚动核心 --- */
        let targetPos = 0, currentPos = 0, driftSpeed = 0.5, isHoverSidebar = false;

        function initSmoothScroll() {
            const sidebar = document.querySelector('.right-sidebar');
            const isMobile = window.innerWidth <= 1024;
            window.addEventListener('wheel', (e) => { if (e.target.closest('.right-sidebar')) targetPos -= e.deltaY * 0.8; }, { passive: true });
            sidebar.addEventListener('mouseenter', () => isHoverSidebar = true);
            sidebar.addEventListener('mouseleave', () => isHoverSidebar = false);

            function frame() {
                if (!isHoverSidebar) targetPos -= driftSpeed;
                currentPos += (targetPos - currentPos) * 0.08;
                const unitSize = isMobile ? sideContainer.offsetWidth / 3 : sideContainer.offsetHeight / 3;
                if (currentPos < -unitSize * 2) { currentPos += unitSize; targetPos += unitSize; }
                else if (currentPos > -unitSize) { currentPos -= unitSize; targetPos -= unitSize; }
                
                const translateVal = Math.round(currentPos * 100) / 100;
                if (isMobile) sideContainer.style.transform = `translate3d(${translateVal}px, 0, 0)`;
                else sideContainer.style.transform = `translate3d(0, ${translateVal}px, 0)`;
                requestAnimationFrame(frame);
            }
            const initialUnit = isMobile ? sideContainer.offsetWidth / 3 : sideContainer.offsetHeight / 3;
            targetPos = -initialUnit; currentPos = -initialUnit;
            requestAnimationFrame(frame);
        }

        function openDetail(key) {
            const p = projectData.find(x => x.k === key);
            document.getElementById('detail-inner').innerHTML = `
                <div class="detail-gallery">
                    <div class="detail-info-grid">
                        <div class="info-col"><h3>Name</h3><p>${p.name}</p></div>
                        <div class="info-col"><h3>Date</h3><p>${p.date}</p></div>
                        <div class="info-col"><h3>Industry</h3><p>${p.ind}</p></div>
                    </div>
                    ${renderMedia(`${p.k}1.${p.subExt}`, true)}
                </div>
            `;
            document.getElementById('detail-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detail-modal').classList.remove('active');
            if(!document.getElementById('all-projects-overlay').classList.contains('active')) document.body.style.overflow = 'auto';
        }

        function showAll() { closeDetail(); document.getElementById('all-projects-overlay').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function hideAll() { document.getElementById('all-projects-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function navTo(id) { hideAll(); closeDetail(); setTimeout(() => { const el = document.getElementById(id); if(el) el.scrollIntoView({ behavior: 'smooth' }); }, 100); }
        function hoverSync(id) { const target = document.getElementById(id); if (target) window.scrollTo({ top: target.offsetTop - 120, behavior: 'auto' }); }

        window.onload = setup;
    </script>
</body>
</html>
